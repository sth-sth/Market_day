<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCoC Matching Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="view-phone">
    <div class="top-controls">
        <div class="view-switch" role="group" aria-label="Display mode">
            <button id="btn-view-phone" class="view-btn active" data-view="phone" data-i18n="phoneView">Phone</button>
            <button id="btn-view-laptop" class="view-btn" data-view="laptop" data-i18n="laptopView">Laptop</button>
        </div>
        <button id="btn-lang-toggle" class="lang-btn" data-i18n="langBtn">EN</button>
    </div>

    <div class="experience-shell">
        <div class="device-frame">
            <div class="device-hardware phone-hardware" aria-hidden="true">
                <span class="phone-speaker"></span>
            </div>
            <div class="device-hardware laptop-hardware" aria-hidden="true">
                <div class="window-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="window-pill">CLP SCoC Experience</div>
            </div>
            <div class="device-content">
                <div id="app" class="app-container">
        <!-- Launch Screen -->
        <section id="launch-screen" class="screen flex-center active">
            <div class="glass-panel launch-panel">
                <p class="launch-kicker">CLP Supplier Code of Conduct</p>
                <h1 data-i18n="title">SCoC 配對遊戲</h1>
                <p class="subtitle" data-i18n="subtitle">捕捉風險，精準配對。</p>
                <p class="launch-desc" data-i18n="launchDesc">掌握 CLP 供應商行為準則的 11 大主題！</p>
                <div class="launch-actions">
                    <button id="btn-start" class="btn btn-neon" data-i18n="start">開始任務</button>
                    <button id="btn-show-qr-launch" class="btn btn-outline" data-i18n="shareBtn">分享遊戲</button>
                </div>
            </div>
        </section>

        <!-- Pre-Game SCoC Check -->
        <section id="precheck-overlay" class="screen flex-center overlay hidden">
            <div class="glass-panel precheck-panel">
                <h2 data-i18n="precheckTitle" class="neon-text">供應商聲明</h2>
                <div class="tut-icon">📋</div>
                <p class="precheck-desc" data-i18n="precheckDesc">假設你是一名供應商，你是否願意遵守 CLP 供應商行為守則（SCoC）？</p>
                <p class="precheck-note" data-i18n="precheckNote">選擇「願意」即可開始遊戲；選擇「不願意」會直接失敗。</p>
                <div class="choice-actions mt-4">
                    <button id="btn-scoc-yes" class="btn btn-neon" data-i18n="precheckYes">願意遵守</button>
                    <button id="btn-scoc-no" class="btn btn-outline" data-i18n="precheckNo">不願意遵守</button>
                </div>
            </div>
        </section>

        <!-- Main Game -->
        <section id="game-ui" class="screen hidden">
            <div class="header">
                <div class="header-title">CLP SCoC</div>
                <div class="stats">
                    <div class="stat-box"><span data-i18n="score">分數</span><strong id="score">0</strong></div>
                    <div class="stat-box"><span data-i18n="time">時間</span><strong id="time">60</strong></div>
                    <div class="stat-box"><span data-i18n="combo">連擊</span><strong id="combo" class="text-glow">0</strong></div>
                    <div class="stat-box"><span data-i18n="lives">生命</span><strong id="lives">3</strong></div>
                </div>
                <button id="btn-pause" class="icon-btn">⏸️</button>
            </div>

            <div class="time-rail">
                <div id="time-fill" class="time-fill"></div>
            </div>

            <div class="playfield">
                <div id="drop-zone" class="drop-zone">
                    <div id="countdown-overlay" class="countdown-overlay hidden">3</div>
                    <div id="feedback-toast" class="feedback-toast hidden"></div>
                    <div id="combo-toast" class="combo-toast hidden"></div>
                </div>

                <div class="buckets-side buckets-side-left">
                    <div id="buckets-left" class="buckets-column"></div>
                </div>

                <div class="buckets-side buckets-side-right">
                    <div id="buckets-right" class="buckets-column"></div>
                </div>
            </div>
        </section>

        <!-- Pause Menu -->
        <section id="pause-overlay" class="screen flex-center overlay hidden">
            <div class="glass-panel">
                <h2 data-i18n="paused">任務暫停</h2>
                <button id="btn-resume" class="btn btn-neon mt-4" data-i18n="resume">繼續</button>
                <button id="btn-quit" class="btn btn-outline mt-2" data-i18n="quit">返回主選單</button>
            </div>
        </section>

        <!-- Settlement -->
        <section id="settlement-screen" class="screen flex-center hidden overlay">
            <div class="glass-panel">
                <h2 data-i18n="settleTitle" class="neon-text">挑戰完成</h2>
                <h1 id="final-title" class="rank-title rainbow-text">Participant</h1>
                <p id="final-reason" class="subtitle"></p>
                <div class="final-grid">
                    <div class="f-stat"><span data-i18n="score">分數</span><strong id="final-score">0</strong></div>
                    <div class="f-stat"><span data-i18n="acc">準確率</span><strong id="final-accuracy">0%</strong></div>
                </div>
                <button id="btn-play-again" class="btn btn-neon mt-4" data-i18n="playAgain">再玩一次</button>
                <button id="btn-show-qr-settlement" class="btn btn-outline mt-2" data-i18n="shareBtn">分享遊戲</button>
            </div>
        </section>

        <!-- QR Modal -->
        <div id="qr-modal" class="modal hidden">
            <div class="glass-panel" style="position:relative;">
                <button id="btn-close-qr" class="close-btn">&times;</button>
                <h3 data-i18n="qrTitle" class="neon-text">掃碼挑戰</h3>
                <div id="qrcode" class="qr-wrapper"></div>
            </div>
        </div>
    </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
